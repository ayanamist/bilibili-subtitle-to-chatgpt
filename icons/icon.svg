<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FB7299"/>
      <stop offset="100%" style="stop-color:#FC4F7E"/>
    </linearGradient>
  </defs>
  <!-- Background rounded square -->
  <rect x="4" y="4" width="120" height="120" rx="24" ry="24" fill="url(#bg)"/>

  <!-- TV/Monitor shape (Bilibili style) -->
  <rect x="22" y="32" width="84" height="56" rx="8" ry="8" fill="white" opacity="0.95"/>

  <!-- TV antennas -->
  <line x1="48" y1="32" x2="38" y2="18" stroke="white" stroke-width="5" stroke-linecap="round"/>
  <line x1="80" y1="32" x2="90" y2="18" stroke="white" stroke-width="5" stroke-linecap="round"/>

  <!-- Subtitle lines inside TV -->
  <rect x="34" y="46" width="40" height="5" rx="2.5" fill="#FB7299" opacity="0.7"/>
  <rect x="34" y="56" width="52" height="5" rx="2.5" fill="#FB7299" opacity="0.5"/>
  <rect x="34" y="66" width="36" height="5" rx="2.5" fill="#FB7299" opacity="0.3"/>

  <!-- Chat/AI bubble overlapping bottom-right of TV -->
  <g transform="translate(72, 58)">
    <rect x="0" y="0" width="40" height="32" rx="8" ry="8" fill="white" stroke="#FB7299" stroke-width="2"/>
    <!-- Bubble tail -->
    <polygon points="8,32 14,40 20,32" fill="white" stroke="#FB7299" stroke-width="2"/>
    <polygon points="9,31 14,38 19,31" fill="white"/>
    <!-- AI dots (typing indicator) -->
    <circle cx="12" cy="16" r="3" fill="#FB7299"/>
    <circle cx="22" cy="16" r="3" fill="#FB7299" opacity="0.7"/>
    <circle cx="32" cy="16" r="3" fill="#FB7299" opacity="0.4"/>
  </g>

  <!-- Arrow from TV to chat -->
  <g transform="translate(64, 78)">
    <polygon points="0,-4 8,0 0,4" fill="white" opacity="0.9"/>
  </g>

  <!-- TV stand -->
  <rect x="48" y="88" width="32" height="4" rx="2" fill="white" opacity="0.8"/>
  <rect x="42" y="92" width="44" height="5" rx="2.5" fill="white" opacity="0.6"/>
</svg>
