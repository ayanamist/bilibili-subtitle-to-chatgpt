<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>B站字幕提取</title>
<link rel="stylesheet" href="popup.css">
</head>
<body>
<div class="container">

  <!-- Options -->
  <div class="option-area" id="optionArea">
    <label class="checkbox-label">
      <input type="checkbox" id="tempChatCheckbox">
      <span>使用临时对话</span>
    </label>
    <label class="checkbox-label" id="forceAIStudioLabel" style="display:none">
      <input type="checkbox" id="forceAIStudioCheckbox">
      <span>始终使用 AI Studio</span>
    </label>
  </div>

  <!-- Action -->
  <div class="action-area">
    <button class="run-btn" id="runBtn">发送字幕到 ChatGPT</button>
    <div class="status-text" id="statusText"></div>
  </div>

  <!-- Error Box -->
  <div class="error-box" id="errorBox"></div>

</div>

<script src="popup.js"></script>
</body>
</html>
